context:
  version: "0.9.2"
  build_number: 0

package:
  name: xeus-sqlite
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus-sqlite/archive/${{ version }}.tar.gz
  sha256: c8eafc86e11ce69776dba99c174496203286603ff72c630a1f4b3fbeac73c61f

build:
  number: ${{ build_number }}
  skip:
    - win

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - xeus-zmq >=3.1.1,<4.0.0
    - nlohmann_json
    - nlohmann_json-abi
    - xtl
    # cpp-tabulate 1.5 is backward incompatible
    - cpp-tabulate >=1.5
    - sqlitecpp
    - sqlite
    - xvega >=0.1.3
    - xvega-bindings >=0.1.1
    - xproperty >=0.12.1,<0.13
  run:
    - ${{ pin_compatible('xvega', upper_bound='x.x') }}
    - ${{ pin_compatible('xvega-bindings', upper_bound='x.x') }}

tests:
  - package_contents:
      bin:
        - xsqlite
      lib:
        - xeus-sqlite
      include:
        - xeus-sqlite/xeus_sqlite_config.hpp
        - xeus-sqlite/xeus_sqlite_interpreter.hpp
      files:
        - ${{ "Library/" if win }}share/jupyter/kernels/xsqlite/kernel.json

about:
  homepage: https://github.com/jupyter-xeus/xeus-sqlite
  repository: https://github.com/jupyter-xeus/xeus-sqlite
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Jupyter kernel for SQLite based on xeus
  documentation: https://xeus-sqlite.readthedocs.io

extra:
  recipe-maintainers:
    - SylvainCorlay
    - JohanMabille
    - martinRenou
    - jtpio
    - marimeireles
